apiVersion: v1
kind: Service
metadata:
  name: trend-app-service
spec:
  type: LoadBalancer
  selector:
    app: trend-app
  ports:
    - port: 80        # <-- Ensure this is 'port'
      targetPort: 3000
      protocol: TCP   # <-- Optional, but if included, it must be the text "TCP", not a number
